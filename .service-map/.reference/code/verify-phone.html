<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9767e4",
                        "background-light": "#f7f6f8",
                        "background-dark": "#171220",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .neo-brutalist-card {
            box-shadow: 4px 4px 0px 0px #9767e4;
            border: 2px solid #9767e4;
        }
        .neo-brutalist-button {
            box-shadow: 4px 4px 0px 0px #000;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .neo-brutalist-button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px #000;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation -->
<header class="flex items-center p-6 justify-between">
<button class="flex items-center justify-center size-12 rounded-xl bg-slate-200 dark:bg-slate-800 border-2 border-slate-900 dark:border-primary">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex items-center gap-2">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center border-2 border-slate-900">
<span class="material-symbols-outlined text-white text-sm">map</span>
</div>
<span class="font-bold tracking-tight text-xl">ServiceMap</span>
</div>
<div class="size-12"></div> <!-- Spacer -->
</header>
<main class="flex-1 flex flex-col px-6 max-w-md mx-auto w-full">
<!-- Header Text -->
<div class="mt-8 mb-10">
<h1 class="text-4xl font-extrabold leading-tight mb-4 uppercase tracking-tighter">
                Verify <span class="text-primary">Phone</span>
</h1>
<p class="text-slate-600 dark:text-slate-400 text-lg leading-relaxed">
                We sent a 6-digit code to <span class="text-slate-900 dark:text-slate-100 font-bold">+1 (555) 000-1234</span>
</p>
</div>
<!-- Verification Code Input -->
<div class="flex justify-between gap-2 mb-12">
<input class="w-12 h-16 text-center text-2xl font-black bg-white dark:bg-slate-800 border-2 border-slate-900 dark:border-primary rounded-none neo-brutalist-card focus:ring-0 focus:outline-none focus:bg-primary/10" maxlength="1" type="text" value="4"/>
<input class="w-12 h-16 text-center text-2xl font-black bg-white dark:bg-slate-800 border-2 border-slate-900 dark:border-primary rounded-none neo-brutalist-card focus:ring-0 focus:outline-none focus:bg-primary/10" maxlength="1" type="text" value="8"/>
<input class="w-12 h-16 text-center text-2xl font-black bg-white dark:bg-slate-800 border-2 border-slate-900 dark:border-primary rounded-none neo-brutalist-card focus:ring-0 focus:outline-none focus:bg-primary/10" maxlength="1" type="text" value="2"/>
<span class="flex items-center text-primary font-black">-</span>
<input class="w-12 h-16 text-center text-2xl font-black bg-white dark:bg-slate-800 border-2 border-slate-900 dark:border-primary rounded-none neo-brutalist-card focus:ring-0 focus:outline-none focus:bg-primary/10" maxlength="1" placeholder="" type="text"/>
<input class="w-12 h-16 text-center text-2xl font-black bg-white dark:bg-slate-800 border-2 border-slate-900 dark:border-primary rounded-none neo-brutalist-card focus:ring-0 focus:outline-none focus:bg-primary/10" maxlength="1" placeholder="" type="text"/>
<input class="w-12 h-16 text-center text-2xl font-black bg-white dark:bg-slate-800 border-2 border-slate-900 dark:border-primary rounded-none neo-brutalist-card focus:ring-0 focus:outline-none focus:bg-primary/10" maxlength="1" placeholder="" type="text"/>
</div>
<button class="w-full py-5 bg-primary text-white font-black text-xl uppercase tracking-widest border-2 border-slate-900 neo-brutalist-button mb-8">
            Verify Now
        </button>
<div class="text-center mb-12">
<p class="text-slate-500 dark:text-slate-400 mb-2">Didn't get the code?</p>
<button class="text-primary font-bold underline decoration-2 underline-offset-4 hover:text-primary/80">
                Resend SMS (0:59)
            </button>
</div>
<!-- Custom Numeric Keypad -->
<div class="grid grid-cols-3 gap-4 mt-auto pb-8">
<button class="h-16 flex items-center justify-center font-black text-2xl bg-white dark:bg-slate-800 border-2 border-slate-900 dark:border-slate-700 rounded-xl hover:bg-primary/10 transition-colors">1</button>
<button class="h-16 flex items-center justify-center font-black text-2xl bg-white dark:bg-slate-800 border-2 border-slate-900 dark:border-slate-700 rounded-xl hover:bg-primary/10 transition-colors">2</button>
<button class="h-16 flex items-center justify-center font-black text-2xl bg-white dark:bg-slate-800 border-2 border-slate-900 dark:border-slate-700 rounded-xl hover:bg-primary/10 transition-colors">3</button>
<button class="h-16 flex items-center justify-center font-black text-2xl bg-white dark:bg-slate-800 border-2 border-slate-900 dark:border-slate-700 rounded-xl hover:bg-primary/10 transition-colors">4</button>
<button class="h-16 flex items-center justify-center font-black text-2xl bg-white dark:bg-slate-800 border-2 border-slate-900 dark:border-slate-700 rounded-xl hover:bg-primary/10 transition-colors">5</button>
<button class="h-16 flex items-center justify-center font-black text-2xl bg-white dark:bg-slate-800 border-2 border-slate-900 dark:border-slate-700 rounded-xl hover:bg-primary/10 transition-colors">6</button>
<button class="h-16 flex items-center justify-center font-black text-2xl bg-white dark:bg-slate-800 border-2 border-slate-900 dark:border-slate-700 rounded-xl hover:bg-primary/10 transition-colors">7</button>
<button class="h-16 flex items-center justify-center font-black text-2xl bg-white dark:bg-slate-800 border-2 border-slate-900 dark:border-slate-700 rounded-xl hover:bg-primary/10 transition-colors">8</button>
<button class="h-16 flex items-center justify-center font-black text-2xl bg-white dark:bg-slate-800 border-2 border-slate-900 dark:border-slate-700 rounded-xl hover:bg-primary/10 transition-colors">9</button>
<button class="h-16 flex items-center justify-center font-black text-2xl bg-slate-100 dark:bg-slate-900 border-2 border-slate-900 dark:border-slate-700 rounded-xl">
<span class="material-symbols-outlined">fingerprint</span>
</button>
<button class="h-16 flex items-center justify-center font-black text-2xl bg-white dark:bg-slate-800 border-2 border-slate-900 dark:border-slate-700 rounded-xl hover:bg-primary/10 transition-colors">0</button>
<button class="h-16 flex items-center justify-center font-black text-2xl bg-slate-100 dark:bg-slate-900 border-2 border-slate-900 dark:border-slate-700 rounded-xl hover:bg-red-500/20 transition-colors">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
</main>
<!-- Bottom Abstract Design Element -->
<div class="h-2 w-full bg-primary border-t-2 border-slate-900"></div>
</body></html>
