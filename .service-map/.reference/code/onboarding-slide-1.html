<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9767e4",
                        "background-light": "#f7f6f8",
                        "background-dark": "#171220",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<!-- Top Navigation -->
<div class="flex items-center justify-end p-6">
<button class="text-primary text-sm font-bold tracking-widest uppercase hover:opacity-80 transition-opacity">
                SKIP
            </button>
</div>
<!-- Main Content Area -->
<div class="flex flex-col flex-grow items-center justify-center px-6">
<!-- Visual Element: Neo-Brutalist Map Illustration -->
<div class="w-full max-w-sm mb-12">
<div class="relative aspect-square w-full bg-primary/10 rounded-xl overflow-hidden border-2 border-primary/20 shadow-2xl shadow-primary/5 group">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary/20 via-transparent to-transparent"></div>
<!-- Map Mockup Graphic -->
<div class="absolute inset-0 p-4">
<div class="w-full h-full rounded-lg bg-background-dark/40 border border-primary/30 relative overflow-hidden" data-alt="Neo-brutalist stylized map with digital grid lines" data-location="San Francisco" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB6ASpdkFjP9W_5xp7_hn23vAjn2uaHmQXgkmjA2rDWmKEI5HEeTTtpAgWpp3pLiIoj_ACHBY5oDS6pD1Si0ZMez49kFBuEwIhJyK0gx8s0TpB8GKu5QtOnELDw2O6mNd-LQzHIOnRSoLvs8QK5FmrShLDtBx1EUEqkuIky8xRYBHDcggX2AHS52yKxuwXIAPOrZZrrZjUDg741_b1oisJ7syC39IE_-UnpJimr5Lct_7Kil72cNU3kAz46Sp5bvO_m8sPNji_8w8Y');">
<!-- Map Pin Markers -->
<div class="absolute top-1/4 left-1/3 text-primary animate-pulse">
<span class="material-symbols-outlined text-4xl">location_on</span>
</div>
<div class="absolute bottom-1/3 right-1/4 text-primary/60">
<span class="material-symbols-outlined text-3xl">location_on</span>
</div>
<div class="absolute top-1/2 right-1/2 text-primary/40">
<span class="material-symbols-outlined text-2xl">location_on</span>
</div>
<!-- Search Bar UI Element -->
<div class="absolute top-4 left-4 right-4 h-10 bg-background-dark/80 backdrop-blur-md rounded-full border border-primary/20 flex items-center px-3 gap-2">
<span class="material-symbols-outlined text-primary text-sm">search</span>
<div class="h-2 w-24 bg-primary/20 rounded-full"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Text Content -->
<div class="text-center max-w-md">
<h1 class="text-slate-900 dark:text-white text-3xl font-bold leading-tight tracking-tight mb-4">
                    FIND SERVICES NEAR YOU
                </h1>
<p class="text-slate-600 dark:text-slate-400 text-base leading-relaxed">
                    Discover trusted professionals in your area. Everything from plumbing to design, mapped out for you.
                </p>
</div>
<!-- Progress Indicator -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-10">
<div class="h-2.5 w-8 rounded-full bg-primary shadow-sm shadow-primary/50"></div>
<div class="h-2.5 w-2.5 rounded-full bg-slate-300 dark:bg-primary/20"></div>
<div class="h-2.5 w-2.5 rounded-full bg-slate-300 dark:bg-primary/20"></div>
</div>
</div>
<!-- Footer Action -->
<div class="p-6 pb-10">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span>NEXT</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</body></html>
