<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ServiceMap - Leave a Review</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9767e4",
                        "background-light": "#f7f6f8",
                        "background-dark": "#171220",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .neo-brutalist-border {
            border: 4px solid #000;
        }
        .neo-brutalist-shadow {
            box-shadow: 8px 8px 0px 0px #000;
        }
        .neo-brutalist-shadow-sm {
            box-shadow: 4px 4px 0px 0px #000;
        }
        .neo-brutalist-shadow-primary {
            box-shadow: 8px 8px 0px 0px #9767e4;
        }
        .dark .neo-brutalist-border {
            border-color: #000;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto min-h-screen flex flex-col border-x-4 border-black bg-background-light dark:bg-background-dark">
<!-- Top Navigation -->
<header class="p-6 border-b-4 border-black flex items-center gap-4 bg-primary">
<button class="bg-white border-2 border-black p-2 flex items-center justify-center neo-brutalist-shadow-sm active:translate-x-1 active:translate-y-1 active:shadow-none transition-all">
<span class="material-symbols-outlined text-black font-bold">arrow_back</span>
</button>
<h1 class="text-2xl font-black uppercase tracking-tighter text-black">Service Complete</h1>
</header>
<main class="flex-1 p-6 flex flex-col gap-8">
<!-- Service Provider Info -->
<div class="bg-white dark:bg-slate-800 neo-brutalist-border neo-brutalist-shadow p-6 flex flex-col items-center text-center">
<div class="w-24 h-24 neo-brutalist-border mb-4 overflow-hidden bg-primary/20">
<img alt="Provider Profile" class="w-full h-full object-cover" data-alt="Professional service provider headshot portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDkUzzJKm1LHXguOFu28VWvDnf2imB2DNUDo7FYHq5etDEm0Q6euoh4ILnNzmtGhcVygiKJY0IgSSWlNIvT9GmH1eKidqTFeZWfEAN_xZf00c69d_Inbs0ZI4i8wnLIH_3plBO-SbtHoFPTyjtnJ_bArl102uikWsIJeiuXQNzHZykJ4XCUe0pu2pa0LTYn3sIx6R9K-ZV-SiAGyIGyBjea5AcgHrZ53RzueT-kS_GidUV49HNMzYFq-e7TjBwsUXULke11or1B0lg"/>
</div>
<h2 class="text-2xl font-black text-black dark:text-white uppercase italic">Marcus J.</h2>
<p class="text-black/60 dark:text-slate-400 font-bold uppercase text-sm">Elite Plumbing Specialist</p>
<div class="mt-2 flex items-center gap-1 bg-black text-primary px-3 py-1 font-black text-xs uppercase">
<span class="material-symbols-outlined text-xs">verified</span> Verified Professional
                </div>
</div>
<!-- Review Form Section -->
<div class="flex flex-col gap-6">
<div class="text-center">
<h3 class="text-3xl font-black uppercase italic tracking-tight text-black dark:text-white">How was the job?</h3>
<p class="text-black/60 dark:text-slate-400 font-medium">Rate your experience with Marcus</p>
</div>
<!-- Star Rating Component -->
<div class="flex justify-center gap-2 py-4">
<button class="w-12 h-12 bg-white dark:bg-slate-800 border-2 border-black flex items-center justify-center neo-brutalist-shadow-sm hover:bg-primary group transition-colors">
<span class="material-symbols-outlined text-black group-hover:text-white text-3xl font-bold">star</span>
</button>
<button class="w-12 h-12 bg-white dark:bg-slate-800 border-2 border-black flex items-center justify-center neo-brutalist-shadow-sm hover:bg-primary group transition-colors">
<span class="material-symbols-outlined text-black group-hover:text-white text-3xl font-bold">star</span>
</button>
<button class="w-12 h-12 bg-white dark:bg-slate-800 border-2 border-black flex items-center justify-center neo-brutalist-shadow-sm hover:bg-primary group transition-colors">
<span class="material-symbols-outlined text-black group-hover:text-white text-3xl font-bold">star</span>
</button>
<button class="w-12 h-12 bg-white dark:bg-slate-800 border-2 border-black flex items-center justify-center neo-brutalist-shadow-sm hover:bg-primary group transition-colors">
<span class="material-symbols-outlined text-black group-hover:text-white text-3xl font-bold">star</span>
</button>
<button class="w-12 h-12 bg-white dark:bg-slate-800 border-2 border-black flex items-center justify-center neo-brutalist-shadow-sm hover:bg-primary/20 group transition-colors">
<span class="material-symbols-outlined text-black/20 group-hover:text-black text-3xl font-bold">star</span>
</button>
</div>
<!-- Text Area -->
<div class="flex flex-col gap-2">
<label class="text-sm font-black uppercase tracking-widest text-black dark:text-slate-300">Your Feedback</label>
<textarea class="w-full h-40 neo-brutalist-border bg-white dark:bg-slate-800 p-4 text-black dark:text-white font-bold placeholder:text-black/30 dark:placeholder:text-slate-500 focus:ring-0 focus:border-primary neo-brutalist-shadow-sm outline-none" placeholder="TELL US WHAT YOU LIKED OR WHAT CAN BE IMPROVED..."></textarea>
</div>
<!-- Photo Upload Placeholder -->
<button class="w-full border-2 border-dashed border-black dark:border-slate-500 p-4 flex items-center justify-center gap-2 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-black dark:text-slate-100">add_a_photo</span>
<span class="font-bold uppercase text-xs text-black dark:text-slate-100">Add photos of the work</span>
</button>
</div>
</main>
<!-- Footer Action -->
<footer class="p-6 mt-auto">
<button class="w-full bg-primary py-5 neo-brutalist-border neo-brutalist-shadow text-black font-black text-xl uppercase italic tracking-tighter hover:translate-x-1 hover:translate-y-1 hover:shadow-none transition-all">
                Submit Review
            </button>
<p class="text-center mt-6 text-[10px] uppercase font-black text-black/40 dark:text-slate-600 tracking-[0.2em]">
                Your review helps the ServiceMap community
            </p>
</footer>
</div>
</body></html>
